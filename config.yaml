# FxPro MT5 Autonomous Loop 001 — Maker/Checker + math Validator
# EXECUTE must be true AND account_type must be demo (or live with allow_live=true)
# before any real order is sent.

mt5:
  # Path to FxPro MT5 terminal executable (adjust for your install)
  path: ""
  # login / password: NEVER put secrets here (tracked file).
  # Use MT5_LOGIN / MT5_PASSWORD env, .env, or secrets.yaml (see secrets.example.yaml).
  # Leave unset (login=0) to attach to an already-logged-in terminal session.
  server: "FxPro-Demo"
  timeout_ms: 10000
  reconnect_attempts: 3
  reconnect_delay_sec: 2.0

account_type: demo   # demo | live
allow_live: false    # must be true to trade on a live account
EXECUTE: false       # master kill-switch for order submission

symbols:
  - name: "#US30"
    state_key: "US30"
    timeframe: "M30"
    long_window: 240
    short_window: 48
    enabled: true

strategy:
  # Defaults used when STATE.md has no optimized params
  long_window: 240
  short_window: 48
  # Holding / exit: reverse signal flips position; optional bars hold
  max_hold_bars: 16

risk:
  # Prototype / demo: fixed cold-start risk until kelly_min_trades closes.
  # (Default W=0.52 R=1.5 → full Kelly ~20% / half-Kelly ~10% — too large vs 10% kill.)
  half_kelly: false
  # Round-trip cost floor (10 bps = 0.1%). Spread is charged once; commission/slip twice.
  round_trip_floor_bps: 10
  # min_cost_bps: 10          # deprecated alias for round_trip_floor_bps
  commission_one_way_bps: 0
  slippage_one_way_bps: 0     # assumed cost; FillModel.slippage_bps is fill-price impact
  # spread_bps: 0             # offline override; live uses MT5 bid–ask
  default_win_rate: 0.52      # used only after kelly_min_trades (or explicit W/R)
  default_reward_risk: 1.5
  max_fraction: 0.005         # hard cap on equity fraction risked per trade (0.5%)
  cold_start_fraction: 0.005  # fixed risk while Kelly is disabled
  kelly_min_trades: 30        # closed trades required before Kelly sizing
  max_lots: 5.0
  min_lots: 0.01
  lookback_trades: 50         # for empirical W / R estimation
  # Max-loss sizing (stop distance → account-currency loss via tick_value)
  stop_pct: 0.005           # 0.5% of price when stop_points is null
  # stop_points: 100        # optional: distance in points (price/point units)
  gap_buffer_mult: 1.25     # inflate stop for gap risk in *sizing* only (fills use OHLC open)
  max_open_risk_fraction: 0.01  # total open risk / equity (1%)
  max_margin_fraction: 0.50     # free-margin usage cap
  rebalance_band: 0.15          # same-side lot drift ignored below 15%; else delta only

backtest:
  limit_fills: true             # require OHLC touch for entries (live-aligned)
  limit_ttl_bars: 2             # cancel unfilled limits after N bars
  slippage_bps: 1.0             # adverse slippage on limit fill / market exit
  limit_offset_bps: 0.0         # place limit this far inside the signal close
  account_sizing: true          # Kelly lots + account-currency DD (not ±1 unit)
  initial_equity: 10000.0       # used when MT5 equity unavailable (optimizer/offline)
  stop_out_level: 0.50          # equity/margin below this → force flatten
  # Symbol contract defaults (override from MT5 live; tune for offline runs)
  tick_size: 1.0
  tick_value: 1.0
  contract_size: 1.0
  volume_step: 0.01
  volume_min: 0.01
  volume_max: 5.0
  point: 1.0
  digits: 1
  leverage: 100.0
  # margin_per_lot: 400.0      # optional fixed margin; else notional/leverage

validator:
  lookback_months: 6
  max_drawdown: 0.10
  sharpe_min: 1.5
  sharpe_max: 3.0
  p_value_max: 0.05
  oos_degradation_max: 0.30
  is_fraction: 0.70             # inner IS/OOS split within each train window
  rolling_oos_fraction: 0.15    # rolling OOS tail (periodic ops; NOT a sealed holdout)
  # holdout_fraction: 0.15      # deprecated alias for rolling_oos_fraction
  wf_folds: 3                   # outer walk-forward folds on pre-rolling-OOS data
  wf_min_train_fraction: 0.40
  min_trades: 40                # full-sample floor (~30–50)
  min_oos_trades: 15            # OOS / rolling-OOS floor (~10–20)
  min_regime_trades: 10         # per trend / mean_reversion on full sample
  block_bootstrap_reps: 400
  block_bootstrap_block_bars: 48  # ~1 trading day of M30
  # Selection bias: DSR + PBO are the family-wise gates. Do NOT combine
  # Bonferroni with block-bootstrap@400 — min p=1/401 > 0.05/120.
  multiple_testing: none        # none | bonferroni | fdr_bh (true BH after search)
  # n_tests: 0                  # 0 → use candidate count from optimizer/LLM
  pvalue_method: hac            # iid | hac | block_bootstrap | max
  # block_bootstrap_report: false  # set true to also compute bootstrap under hac
  hac_lags: 0                   # 0 → Newey–West automatic bandwidth
  min_dsr: 0.95                 # Deflated Sharpe Ratio floor (0 disables)
  pbo_enabled: true
  pbo_max: 0.50                 # CSCV Probability of Backtest Overfitting ceiling
  pbo_slices: 8                 # even CSCV partitions (8 → C(8,4)=70 combos)

optimizer:
  long_windows: [180, 200, 220, 240, 260, 280]
  short_windows: [24, 36, 48, 60, 72]
  max_hold_bars: [8, 12, 16, 24]
  sharpe_degrade_trigger: 0.20   # relative drop vs last accepted
  ic_degrade_trigger: 0.20
  nested_search: true            # inner search → outer WF → rolling OOS gate
  nested_inner: grid             # grid | auto (LLM then grid) for each WF fold

anthropic:
  maker_model: "claude-sonnet-4-5"
  checker_model: "claude-opus-4-8"   # current first-party Opus (claude-opus-4 retired)
  maker_candidates: 8
  max_retries: 5
  enable_prompt_cache: true
  # API key: set ANTHROPIC_API_KEY in the environment / .env (never commit secrets)
  # MT5 login/password: MT5_LOGIN / MT5_PASSWORD or secrets.yaml (never commit)

kill_switch:
  max_drawdown: 0.10
  poll_seconds: 15

loop:
  poll_seconds: 30
  bar_timeframe_minutes: 30
  review_weekday: 5          # Saturday (Mon=0)
  review_hour_utc: 6
  log_dir: "logs"

paths:
  state_dir: "state"
